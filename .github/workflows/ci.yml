name: CI

# Mirrors ./test.bash locally — each job installs the prerequisites it
# needs and then delegates to a single ./test.bash flag, so there is one
# source of truth for "what counts as passing tests."

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: ./test.bash --lint
        run: ./test.bash --lint

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Configure git identity for fixture tests
        run: |
          git config --global user.email ci@example.com
          git config --global user.name "CI"

      - name: ./test.bash --unit
        run: ./test.bash --unit

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: ./test.bash --secrets
        run: ./test.bash --secrets
